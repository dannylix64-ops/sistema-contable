<h2>Dashboard</h2>

<form method="POST" action="/cliente">
<input name="nombre" placeholder="Cliente">
<button>Guardar</button>
</form>

<ul>
{% for c in clientes %}
<li>{{c[1]}}</li>
{% endfor %}
</ul>

<a href="/logout">Salir</a>
<h2>Transacciones</h2>

<table border="1">
    <tr>
        <th>Tipo</th>
        <th>Descripción</th>
        <th>Monto</th>
        <th>Fecha</th>
    </tr>

    {% for t in transacciones %}
    <tr>
        <td>{{ t[1] }}</td>
        <td>{{ t[2] }}</td>
        <td>{{ t[3] }}</td>
        <td>{{ t[4] }}</td>
    </tr>
    {% endfor %}
</table>
